<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo da Adivinhação</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            max-width: 400px;
            width: 90%;
        }

        h1 {
            margin-bottom: 20px;
            font-size: 2rem;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .instrucoes {
            margin-bottom: 30px;
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .input-group {
            margin-bottom: 20px;
        }

        input[type="number"] {
            width: 100px;
            padding: 15px;
            font-size: 1.5rem;
            text-align: center;
            border: none;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
            outline: none;
            transition: background 0.3s;
        }

        input[type="number"]::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        input[type="number"]:focus {
            background: rgba(255, 255, 255, 0.3);
        }

        button {
            padding: 15px 40px;
            font-size: 1.1rem;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.2s, background 0.3s;
            margin: 5px;
        }

        #chutar {
            background: linear-gradient(135deg, #00b4d8, #0077b6);
            color: #fff;
        }

        #chutar:hover {
            transform: scale(1.05);
            background: linear-gradient(135deg, #0096c7, #006d9b);
        }

        #reiniciar {
            background: linear-gradient(135deg, #e63946, #d62828);
            color: #fff;
            display: none;
        }

        #reiniciar:hover {
            transform: scale(1.05);
        }

        .resultado {
            margin-top: 20px;
            font-size: 1.3rem;
            min-height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .acerto {
            color: #06d6a0;
            animation: pulse 0.5s;
        }

        .erro {
            color: #ef476f;
        }

        .dica {
            color: #ffd166;
        }

        .stats {
            margin-top: 20px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        .stats p {
            margin: 5px 0;
            font-size: 0.95rem;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .palpites-container {
            margin-top: 20px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        .palpites-container h3 {
            margin-bottom: 10px;
            font-size: 1rem;
            color: #ffd166;
        }

        .lista-palpites {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            max-height: 120px;
            overflow-y: auto;
        }

        .palpite-tag {
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 0.9rem;
            font-weight: bold;
        }

        .palpite-tag.baixo {
            background: rgba(0, 180, 216, 0.3);
            color: #00b4d8;
            border: 1px solid #00b4d8;
        }

        .palpite-tag.alto {
            background: rgba(230, 57, 70, 0.3);
            color: #ef476f;
            border: 1px solid #ef476f;
        }

        .palpite-tag.acerto {
            background: rgba(6, 214, 160, 0.3);
            color: #06d6a0;
            border: 1px solid #06d6a0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎯 Jogo da 🎯 Adivinhação</h1>
        <p class="instrucoes">Eu pensei em um número de <strong>1</strong> a <strong>100</strong>.<br>Consegue adivinhar?</p>
        
        <div class="input-group">
            <input type="number" id="palpite" min="1" max="100" placeholder="?">
        </div>
        
        <button id="chutar">Chutar!</button>
        <button id="reiniciar">Jogar Novamente</button>
        
        <div class="resultado" id="resultado"></div>
        
        <div class="stats">
            <p>Tentativas: <span id="tentativas">0</span></p>
            <p>Melhor recorde: <span id="recorde">-</span></p>
        </div>

        <div class="palpites-container">
            <h3>Palpites:</h3>
            <div id="listaPalpites" class="lista-palpites"></div>
        </div>
    </div>

    <script src="jogo.js?v=2"></script>
</body>
</html>
