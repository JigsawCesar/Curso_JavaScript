<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chatbot IA</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="chat-container">
    <div class="chat-header">
      <h1>🤖 Chatbot IA</h1>
      <div class="clear-wrapper">
        <button id="clearBtn">🗑️</button>
        <span class="clear-label">Limpar conversa</span>
      </div>
    </div>
    <div class="chat-messages" id="messages">
      <div class="message bot">
        <div class="message-content">Olá! Sou um assistente com inteligência artificial. Como posso ajudar você hoje?</div>
      </div>
    </div>
    <form class="chat-input" id="chatForm">
      <input type="text" id="messageInput" placeholder="Digite sua mensagem..." autocomplete="off">
      <button type="submit" id="sendBtn">
        <span id="sendText">Enviar</span>
        <span id="loading" class="loading" style="display:none;">⏳</span>
      </button>
    </form>
    <div class="history-bar" id="historyBar" style="display:none;">
      <button id="historyBtn">💬 Ver histórico da conversa</button>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
